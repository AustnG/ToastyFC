<!DOCTYPE html>
<html>
<head>
<title>Your Website</title>
<style>
/* Let's add some basic styling based on what we saw on the website */
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 20px;
}

.header {
background-color: #f1f1f1;
padding: 20px;
text-align: center;
}

.navigation {
background-color: #333;
overflow: hidden;
}

.navigation a {
float: left;
color: #f2f2f2;
text-align: center;
padding: 14px 20px;
text-decoration: none;
font-size: 17px;
}

.navigation a:hover {
background-color: #ddd;
color: black;
}

.main {
padding: 20px 16px;
}

.footer {
background-color: #f1f1f1;
padding: 10px;
text-align: center;
}
</style>
</head>
<body>

<div class="header">
<h1>Your Website</h1>
</div>

<div class="navigation">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Schedule</a>
<a href="#">Tickets</a>
<a href="#">Contact</a>
</div>

<div class="main">
<h2>Welcome to your website!</h2>
<p>This is a basic example of a website that you can customize to fit your needs. You can add text, images, and videos to your website. You can also create links to other pages on your website.</p>
</div>

<div class="footer">
<p>Copyright &copy; 2024 Your Website</p>
</div>

</html>
